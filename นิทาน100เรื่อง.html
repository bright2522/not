<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นิทาน 100 เรื่อง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Mitr:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6e3;
    --warm: #f5e6c8;
    --gold: #c8922a;
    --dark-gold: #8b5e1a;
    --brown: #5c3d1e;
    --text: #3a2510;
    --accent: #e07b39;
    --green: #4a7c59;
    --shadow: rgba(92,61,30,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background-color: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(200,146,42,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(74,124,89,0.07) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--brown) 0%, var(--dark-gold) 50%, var(--brown) 100%);
    color: var(--cream);
    text-align: center;
    padding: 48px 24px 40px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 40px
    );
  }

  header h1 {
    font-family: 'Mitr', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    position: relative;
  }

  header .subtitle {
    margin-top: 10px;
    font-size: 1.1rem;
    opacity: 0.85;
    font-weight: 300;
    position: relative;
  }

  header .ornament {
    font-size: 2rem;
    margin: 12px 0 0;
    opacity: 0.7;
    position: relative;
  }

  .search-bar {
    max-width: 600px;
    margin: 32px auto 0;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 14px 48px 14px 20px;
    border-radius: 50px;
    border: 2px solid var(--gold);
    background: rgba(255,255,255,0.9);
    font-family: 'Sarabun', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: box-shadow 0.2s;
  }

  .search-bar input:focus {
    box-shadow: 0 0 0 3px rgba(200,146,42,0.3);
  }

  .search-bar .icon {
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem; opacity: 0.6;
  }

  .stats {
    text-align: center;
    padding: 20px;
    font-size: 0.95rem;
    color: var(--dark-gold);
    font-weight: 600;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px var(--shadow);
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    border: 1px solid rgba(200,146,42,0.15);
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(92,61,30,0.22);
  }

  .card-header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--warm);
  }

  .card-number {
    background: linear-gradient(135deg, var(--gold), var(--accent));
    color: white;
    font-family: 'Mitr', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 5px 10px;
    border-radius: 50px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-title {
    font-family: 'Mitr', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--brown);
    line-height: 1.4;
  }

  .card-emoji {
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .card-body {
    padding: 16px 20px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .label-lesson { color: var(--green); }
  .label-apply { color: var(--accent); }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: currentColor;
    opacity: 0.25;
  }

  .card p {
    font-size: 0.91rem;
    line-height: 1.75;
    color: #4a3520;
  }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    padding: 32px;
    color: var(--dark-gold);
    font-size: 0.9rem;
    border-top: 1px solid var(--warm);
  }
</style>
</head>
<body>

<header>
  <div class="ornament">✦ ✦ ✦</div>
  <h1>📖 นิทาน ๑๐๐ เรื่อง</h1>
  <p class="subtitle">ปัญญาจากเรื่องเล่า · บทเรียนสำหรับชีวิต</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="ค้นหาชื่อเรื่องหรือบทเรียน..." oninput="filterCards()">
    <span class="icon">🔍</span>
  </div>
</header>

<div class="stats" id="stats">แสดง 100 เรื่องจากทั้งหมด 100 เรื่อง</div>

<div class="container" id="cardContainer"></div>

<footer>✦ นิทานทุกเรื่องมีบทเรียนที่ซ่อนอยู่ · อ่านด้วยใจเปิดกว้าง ✦</footer>

function renderCards(data) {
  const container = document.getElementById('cardContainer');
  container.innerHTML = data.map(t => `
    <div class="card" data-id="${t.id}">
      <div class="card-header">
        <span class="card-emoji">${t.emoji}</span>
        <div>
          <div class="card-number">เรื่องที่ ${t.id}</div>
          <div class="card-title">${t.title}</div>
        </div>
      </div>
      <div class="card-body">
        <div>
          <div class="section-label label-lesson">📚 สรุปความรู้</div>
          <p>${t.lesson}</p>
        </div>
        <div>
          <div class="section-label label-apply">💡 ประยุกต์ใช้ในชีวิต</div>
          <p>${t.apply}</p>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('stats').textContent =
    `แสดง ${data.length} เรื่องจากทั้งหมด ${tales.length} เรื่อง`;
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderCards(tales); return; }
  const filtered = tales.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.lesson.toLowerCase().includes(q) ||
    t.apply.toLowerCase().includes(q)
  );
  renderCards(filtered);
}

renderCards(tales);
</script>
